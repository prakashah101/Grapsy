{% extends "base.html" %}
{% block title %}New Post — Grapsy{% endblock %}
{% block head %}
<style>
.create-page{max-width:540px;margin:0 auto;padding:0 16px 40px}
.create-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;animation:fadeUp .4s ease}
.create-card h2{font-size:1.2rem;font-weight:700;margin-bottom:24px}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;margin-bottom:20px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:#f0f9ff}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone-icon{font-size:2.5rem;margin-bottom:8px}
.drop-zone-label{font-size:.9rem;font-weight:600;color:var(--accent)}
.drop-zone-hint{font-size:.78rem;color:var(--muted);margin-top:4px}
.preview-wrap{display:none;margin-bottom:20px;border-radius:12px;overflow:hidden;position:relative}
.preview-wrap img,.preview-wrap video{width:100%;max-height:360px;object-fit:cover;display:block}
.preview-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
</style>
{% endblock %}
{% block content %}
<div class="create-page">
  <div class="create-card">
    <h2>Share a New Post</h2>
    <form method="POST" enctype="multipart/form-data" id="postForm">
      <div class="drop-zone" id="dropZone">
        <input type="file" name="media" id="mediaInput" accept="image/*,video/*" onchange="previewMedia(this)">
        <div class="drop-zone-icon">🖼️</div>
        <div class="drop-zone-label">Click or drag & drop</div>
        <div class="drop-zone-hint">Photo or Video · Max 50MB</div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <div id="previewContent"></div>
        <button type="button" class="preview-remove" onclick="removePreview()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Caption</label>
        <textarea class="form-input" name="caption" placeholder="Write a caption…" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Share Post</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function previewMedia(input) {
  const file = input.files[0]; if (!file) return;
  const wrap = document.getElementById('previewWrap');
  const content = document.getElementById('previewContent');
  document.getElementById('dropZone').style.display = 'none';
  wrap.style.display = 'block';
  const url = URL.createObjectURL(file);
  if (file.type.startsWith('video/')) {
    content.innerHTML = `<video src="${url}" controls style="width:100%;max-height:360px;object-fit:cover"></video>`;
  } else {
    content.innerHTML = `<img src="${url}" alt="preview">`;
  }
}
function removePreview() {
  document.getElementById('mediaInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('previewContent').innerHTML = '';
  document.getElementById('dropZone').style.display = 'block';
}
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const dt = e.dataTransfer;
  if (dt.files.length) {
    document.getElementById('mediaInput').files = dt.files;
    previewMedia(document.getElementById('mediaInput'));
  }
});
</script>
{% endblock %}

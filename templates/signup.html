<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>
    <form method="POST">
        <h2>Create new account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
        <label>Name<br><input type="text" name="name" placeholder="Enter your full name" required></label><br>
        <label>Username<br><input type="text" name="username" placeholder="Enter an unique username" required></label><br>
        <label>Email<br><input type="email" name="email" placeholder="Enter your email" required></label><br>
        <label>Country<br>
            <select name="country" required>
                <option value="">-- Select Country --</option>
                {% for country in countries %}
                    <option value="{{ country }}">{{ country }}</option>
                {% endfor %}
            </select>
        </label><br>
        <label>Phone Number<br><input type="tel" name="phone" required pattern="[0-9]{7,15}" title="7 to 15 digits"></label><br>
        <label>Password<br><input type="password" name="password" required></label><br>
        <button type="submit">Sign Up</button>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </form>

</body>
</html>
